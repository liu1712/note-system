<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人笔记管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="page active">
            <div class="login-container">
                <h1>📝 个人笔记系统</h1>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn-primary">登 录</button>
                    <p class="hint">提示：任意用户名和密码即可登录</p>
                </form>
            </div>
        </div>

        <!-- 主界面 -->
        <div id="main-page" class="page">
            <header>
                <h1>📝 我的笔记</h1>
                <div class="header-right">
                    <span id="user-display"></span>
                    <button id="logout-btn" class="btn-secondary">退出登录</button>
                </div>
            </header>

            <main>
                <!-- 统计卡片 -->
                <div class="stats-container">
                    <div class="stat-card">
                        <span class="stat-number" id="total-notes">0</span>
                        <span class="stat-label">总笔记数</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="today-notes">0</span>
                        <span class="stat-label">今日新增</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="important-notes">0</span>
                        <span class="stat-label">重要笔记</span>
                    </div>
                </div>

                <!-- 新建笔记 -->
                <div class="note-editor">
                    <input type="text" id="note-title" placeholder="笔记标题...">
                    <textarea id="note-content" placeholder="写下你的想法..."></textarea>
                    <div class="editor-actions">
                        <label class="checkbox-label">
                            <input type="checkbox" id="note-important">
                            <span>标记为重要</span>
                        </label>
                        <button id="save-note-btn" class="btn-primary">保存笔记</button>
                    </div>
                </div>

                <!-- 笔记列表 -->
                <div class="notes-section">
                    <div class="section-header">
                        <h2>笔记列表</h2>
                        <div class="filter-tabs">
                            <button class="filter-btn active" data-filter="all">全部</button>
                            <button class="filter-btn" data-filter="important">重要</button>
                        </div>
                    </div>
                    <div id="notes-list" class="notes-list">
                        <!-- 笔记将动态插入这里 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
